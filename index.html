<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="./img/favicon.svg" type="image/svg+xml">
        <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon_32_32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon_16_16.png">
        <meta property="og:title" content="이은지 | 풀스택 개발자 포트폴리오">
		<meta property="og:description" content="우연한 성공을 반복 가능한 성과로 바꾸는 개발자, 이은지입니다.">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://nogglee.com">
		<meta property="og:image" content="https://nogglee.com/img/ogimage.png">
        <title>이은지 | 풀스택 개발자 포트폴리오</title>
        <link rel="stylesheet" href="./style.css">
        <script src="./Constant.js"></script>
        <script src="./data.js"></script>
        <script src="./render.js"></script>
    </head>
    <body>
        <div id="header">
            <div class="sticky_sentinel"></div>
            <a href="/"><img id="logo"></a>
            <div id="menu_group"></div>
        </div>
        <div class="container">

            <!-- 프로필 -->
            <div class="container_inner">
                <div class="profile_section">
                    <img id="profile">
                    <div class="profile_info">
                        <h1>우연한 성공을 반복 가능한 성과로<br>바꾸는 개발자, <highlight>이은지</highlight>입니다.</h1>
                        <div class="social_links" id="profile-links"></div>
                    </div>
                </div>
            </div>

            <!-- 핵심역량 -->
            <div class="container_inner">
                <div class="about_section" id="about-content"></div>
            </div>

            <!-- 프로젝트 -->
            <div class="container_inner">
                <div class="experiences_list" id="projects-content"></div>
            </div>

            <!-- 경력 -->
            <div class="container_inner">
                <div class="experiences_list" id="career-content"></div>
            </div>

            <!-- 활동 -->
            <div class="container_inner">
                <div class="activities_list" id="activities-content"></div>
            </div>

        </div>

        <div id="footer"><p>Copyright © 2026 Nogglee. All rights reserved.</p></div>

        <!-- Templates -->
        <template id="tpl-nav-dot">
            <a><svg width="24" height="24" class="dot"><circle cx="12" cy="12" r="12" stroke="none" stroke-width="2" /></svg></a>
        </template>

        <template id="tpl-section-title">
            <span class="sticky_sentinel"></span>
            <div class="section_title section_anchor">
                <div class="section_title_inner">
                    <div class="dot_group"></div>
                    <div class="sticky_inner"><h1></h1></div>
                </div>
            </div>
        </template>

        <template id="tpl-career-item">
            <div class="experiences_item career_item">
                <div class="career_left">
                    <img class="career_logo_wrap">
                    <div class="career_info">
                        <h1 class="career_company"></h1>
                        <div class="career_role"></div>
                        <div class="career_period"></div>
                        <div class="career_links"></div>
                    </div>
                </div>
                <div class="career_right"></div>
            </div>
        </template>

        <template id="tpl-career-link">
            <a target="_blank"><img></a>
        </template>

        <template id="tpl-career-title-block">
            <div class="career_title_block">
                <h3 class="career_title"></h3>
            </div>
        </template>

        <template id="tpl-text-button">
            <input type="button" class="text_button">
        </template>

        <template id="tpl-career-tag">
            <span></span>
        </template>

        <template id="tpl-activity-item">
            <div class="activity_item">
                <h1></h1>
                <p class="activity_period"></p>
                <p class="activity_desc"></p>
            </div>
        </template>

    </body>
</html>
